name: Release
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write       # trusted PyPI publishing — no token needed
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
